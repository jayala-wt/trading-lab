id: crypto_swing
name: Crypto Swing Strategy  
version: "1.0"
description: Swing trade crypto on technical setups - 24/7 markets.

patterns:
  - ema_crossover
  - support_bounce
  - hammer_candle
  - crypto_whale_activity

entry_logic:
  operator: OR
  conditions:
    - pattern: ema_crossover
      min_score: 0.3
    - combo:
        operator: AND
        patterns:
          - support_bounce
          - hammer_candle
    - pattern: crypto_whale_activity
      direction: follow_imbalance

risk:
  position_pct: 5.0
  stop_loss_pct: 3.0
  take_profit_pct: 9.0
  trailing_stop_pct: 2.0
  max_hold_hours: 72

filters:
  min_volume_usd: 1000000
  min_market_cap: 100000000
  exclude_stablecoins: true
