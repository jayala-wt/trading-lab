id: composite_momentum
name: Composite Momentum Signal
implementation: primitives
description: |
  Multi-indicator composite signal combining RSI, MACD, Stochastic, Bollinger,
  ADX, EMAs, and Volume for high-confidence entries. Requires at least 5 of 9
  indicators to agree on direction with strong trend confirmation.

params:
  # Thresholds
  min_net_score: 25       # Minimum composite score (-100 to +100)
  min_confidence: 50      # Minimum indicator agreement %
  min_adx: 20             # Minimum trend strength
  
  # RSI params  
  rsi_period: 14
  rsi_oversold: 30
  rsi_overbought: 70
  
  # MACD params
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  
  # Bollinger params
  bb_period: 20
  bb_std: 2.0
  
  # Stochastic params
  stoch_k: 14
  stoch_d: 3
  
  # EMA params
  ema_fast: 9
  ema_slow: 21
  
  # Volume params
  vol_period: 20
  vol_spike: 1.3          # 1.3x average for confirmation

logic:
  # Signal fires when we have bullish confluence
  signal: |
    (
      rsi(rsi_period) < rsi_overbought and
      stochastic_k(stoch_k) < 80 and
      adx(14) > min_adx and
      volume_ratio(vol_period) > vol_spike and
      (
        (rsi(rsi_period) < rsi_oversold and stochastic_k(stoch_k) < 20) or
        (macd_histogram(macd_fast, macd_slow, macd_signal) > 0 and ema(ema_fast) > ema(ema_slow)) or
        (bb_pct(bb_period, bb_std) < 0.2 and stochastic_k(stoch_k) < 30)
      )
    )
  
  # Score based on composite strength
  score: |
    (
      (30 - rsi(rsi_period)) / 3 +
      macd_histogram(macd_fast, macd_slow, macd_signal) * 10 +
      (20 - stochastic_k(stoch_k)) / 2 +
      (ema(ema_fast) - ema(ema_slow)) / close * 100 +
      volume_ratio(vol_period) * 5 +
      adx(14) / 5
    ) / 6
  
  tags:
    rsi: "rsi(rsi_period)"
    macd_hist: "macd_histogram(macd_fast, macd_slow, macd_signal)"
    stoch_k: "stochastic_k(stoch_k)"
    bb_pct: "bb_pct(bb_period, bb_std)"
    ema_spread: "(ema(ema_fast) - ema(ema_slow)) / close * 100"
    adx: "adx(14)"
    volume_ratio: "volume_ratio(vol_period)"
